<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учёт расходов</title>
    <style>
        :root { --bg: #f8f9fa; --card: #fff; --primary: #007bff; --danger: #dc3545; --text: #2c3e50; }
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 1000px; margin: 2rem auto; padding: 0 1rem; background: var(--bg); color: var(--text); }
        .card { background: var(--card); padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        h1, h2, h3 { margin: 0 0 1rem; }
        form, .filters { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: end; }
        input, button, select { padding: 0.6rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(0.9); }
        button.del { background: var(--danger); padding: 0.4rem 0.8rem; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.7rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f3f5; }
        .group-card { background: #e9ecef; padding: 1rem; border-radius: 8px; margin-bottom: 0.8rem; }
        .export-box { margin-top: 1rem; display: flex; gap: 0.8rem; align-items: center; }
        @media print { .no-print, form, .filters, .export-box, .del { display: none !important; } body { margin: 0; } .card { box-shadow: none; } }
    </style>
</head>
<body>
    <div class="no-print"><h1>💸 Учёт расходов</h1></div>

    <!-- 🔐 Блок авторизации -->
    <div class="card no-print" id="authSection">
        <div id="userInfo" style="display:none; margin-bottom:1rem;">
            👤 <span id="currentUsername"></span> 
            <button onclick="logout()" style="margin-left:1rem; padding:0.3rem 0.8rem; background:#6c757d;">Выйти</button>
        </div>
        
        <div id="authForm">
            <div style="display:flex; gap:0.5rem; margin-bottom:0.8rem;">
                <button type="button" id="btnRegister" onclick="setMode('register')" style="flex:1; background:#28a745;">📝 Регистрация</button>
                <button type="button" id="btnLogin" onclick="setMode('login')" style="flex:1; background:#007bff;">🔑 Вход</button>
            </div>
            
            <form id="credentialsForm" style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                <input type="text" id="regUsername" placeholder="Логин" required style="flex:1; min-width:120px;">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)" required style="flex:1; min-width:120px;">
                <button type="submit" id="submitBtn" style="background:#007bff;">Зарегистрироваться</button>
            </form>
            <div id="authError" style="color:#dc3545; margin-top:0.5rem; font-size:0.9rem;"></div>
            <div id="authHint" style="color:#6c757d; margin-top:0.3rem; font-size:0.85rem;">
                При регистрации создаётся личный счёт. Пароль хранится в зашифрованном виде.
            </div>
        </div>
    </div>
    
    <div class="card no-print">
        <form id="addForm">
            <input type="text" id="category" placeholder="Категория" required>
            <input type="number" id="amount" step="0.01" placeholder="Сумма" required>
            <input type="date" id="date" required>
            <button type="submit">➕ Добавить</button>
        </form>
    </div>

    <div class="card no-print filters">
        <input type="date" id="fStart" placeholder="От">
        <input type="date" id="fEnd" placeholder="До">
        <input type="text" id="fCat" placeholder="Категория">
        <button onclick="applyFilter()">🔍 Фильтр</button>
        <select id="viewMode" onchange="render()">
            <option value="list">📋 Список</option>
            <option value="group">📊 Группировка</option>
        </select>
    </div>

    <div class="card" id="reportArea">
        <h2 id="reportTitle">Все расходы</h2>
        <div id="stats" style="display:flex; gap:1rem; margin-bottom:1rem; flex-wrap:wrap;"></div>
        <div id="content"></div>
    </div>

    <div class="card no-print export-box">
        <input type="text" id="label" placeholder="Наклейка / Заголовок отчёта" value="Отчёт по расходам">
        <button onclick="exportExcel()">📥 Excel</button>
        <button onclick="exportPDF()">🖨️ PDF</button>
    </div>

    <!-- 🔥 ОДИН скрипт, всё внутри -->
    <script>
        // === 🔐 АВТОРИЗАЦИЯ ===
        let authMode = 'register'; // 'register' или 'login'
        let token = localStorage.getItem('expense_token');
        let currentUser = localStorage.getItem('expense_user');
        
        function setMode(mode) {
            authMode = mode;
            const submitBtn = document.getElementById('submitBtn');
            const btnRegister = document.getElementById('btnRegister');
            const btnLogin = document.getElementById('btnLogin');
            
            if (mode === 'register') {
                submitBtn.textContent = '📝 Зарегистрироваться';
                submitBtn.style.background = '#28a745';
                if (btnRegister) btnRegister.style.opacity = '1';
                if (btnLogin) btnLogin.style.opacity = '0.7';
            } else {
                submitBtn.textContent = '🔑 Войти';
                submitBtn.style.background = '#007bff';
                if (btnRegister) btnRegister.style.opacity = '0.7';
                if (btnLogin) btnLogin.style.opacity = '1';
            }
        }
        
        function logout() {
            localStorage.removeItem('expense_token');
            localStorage.removeItem('expense_user');
            token = null; currentUser = null;
            location.reload();
        }
        
        // Перехват fetch для добавления токена
        const originalFetch = window.fetch;
        window.fetch = function(url, options = {}) {
            if (token && url.startsWith('/api/') && !url.startsWith('/api/auth')) {
                options.headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
            }
            return originalFetch(url, options);
        };
        
        // Обработка формы
        const credentialsForm = document.getElementById('credentialsForm');
        if (credentialsForm) {
            credentialsForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                // 🔥 Проверка ввода перед запросом
                if (!username || username.length < 3) {
                    document.getElementById('authError').textContent = 'Логин должен быть ≥ 3 символов';
                    return;
                }
                if (!password || password.length < 6) {
                    document.getElementById('authError').textContent = 'Пароль должен быть ≥ 6 символов';
                    return;
                }
                
                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value;
                
                if (username.length < 3 || password.length < 6) {
                    document.getElementById('authError').textContent = 'Логин ≥ 3 символов, пароль ≥ 6';
                    return;
                }
                
                const endpoint = authMode === 'register' ? '/api/auth/register' : '/api/auth/login';
                try {
                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username, password})
                    });
                    const data = await res.json();
                    
                    if (data.success && data.token && data.username) {
                        // ✅ Только если сервер вернул токен И имя — считаем вход успешным
                        token = data.token;
                        currentUser = data.username;
                        localStorage.setItem('expense_token', token);
                        localStorage.setItem('expense_user', currentUser);
                        
                        document.getElementById('authSection').style.display = 'none';
                        document.getElementById('userInfo').style.display = 'block';
                        document.getElementById('currentUsername').textContent = currentUser;
                        document.getElementById('authError').textContent = '';
                        
                        document.querySelectorAll('.no-print').forEach(el => {
                            if (el.id !== 'authSection') el.style.display = '';
                        });
                        if (typeof loadData === 'function') loadData();
                    } else {
                        // ❌ Ошибка — показываем сообщение из сервера или дефолтное
                        const msg = data.error || (authMode === 'register' ? 'Пользователь уже существует' : 'Неверный логин или пароль');
                        document.getElementById('authError').textContent = msg;
                        console.error('Auth failed:', data);
                    }
                } catch (err) {
                    document.getElementById('authError').textContent = 'Сервер недоступен';
                }
            });
        }
        
        // Проверка токена при загрузке
        if (token && currentUser) {
            setTimeout(() => {
                const authSec = document.getElementById('authSection');
                const userInfo = document.getElementById('userInfo');
                const currentUsername = document.getElementById('currentUsername');
                if (authSec && userInfo && currentUsername) {
                    authSec.style.display = 'none';
                    userInfo.style.display = 'block';
                    currentUsername.textContent = currentUser;
                    document.querySelectorAll('.no-print').forEach(el => {
                        if (el.id !== 'authSection') el.style.display = '';
                    });
                }
                if (typeof loadData === 'function') loadData();
            }, 100);
        }
        // === 🔐 КОНЕЦ АВТОРИЗАЦИИ ===

        // === 📦 ОСНОВНОЙ КОД ПРИЛОЖЕНИЯ ===
        const API = '/api/transactions';
        let data = [];

        async function loadData(url = API) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                data = await res.json();
                render();
            } catch (e) { console.error('Load error:', e); }
        }

        function render() {
            const modeEl = document.getElementById('viewMode');
            const titleEl = document.getElementById('reportTitle');
            const contentEl = document.getElementById('content');
            const statsEl = document.getElementById('stats');
            const labelEl = document.getElementById('label');
            if (!modeEl || !titleEl || !contentEl || !statsEl) return;

            const mode = modeEl.value;
            if (data.length === 0) {
                contentEl.innerHTML = '<p style="color:#666">Нет данных</p>';
                statsEl.innerHTML = '';
                titleEl.textContent = (labelEl ? labelEl.value : 'Отчёт') || 'Отчёт';
                return;
            }
            const sum = data.reduce((a, b) => a + b.amount, 0);
            statsEl.innerHTML = `
                <div class="group-card"><b>Всего:</b> ${sum.toFixed(2)} ₽</div>
                <div class="group-card"><b>Записей:</b> ${data.length}</div>`;

            if (mode === 'group') {
                const groups = {};
                data.forEach(t => { groups[t.category] = (groups[t.category] || 0) + t.amount; });
                contentEl.innerHTML = Object.entries(groups).sort((a,b)=>b[1]-a[1]).map(([cat, s]) =>
                    `<div class="group-card"><b>${cat}</b>: ${s.toFixed(2)} ₽</div>`).join('');
            } else {
                contentEl.innerHTML = `
                <table><thead><tr><th>Дата</th><th>Категория</th><th>Сумма</th><th class="no-print">Действие</th></tr></thead>
                <tbody>${data.map(t => `
                    <tr><td>${t.date}</td><td>${t.category}</td><td>${t.amount.toFixed(2)} ₽</td>
                    <td class="no-print"><button class="del" onclick="deleteTx(${t.id})">🗑️</button></td></tr>
                `).join('')}</tbody></table>`;
            }
            if (titleEl) titleEl.textContent = (labelEl ? labelEl.value : 'Отчёт') || 'Отчёт';
        }

        async function applyFilter() {
            const s = document.getElementById('fStart')?.value || '';
            const e = document.getElementById('fEnd')?.value || '';
            const c = document.getElementById('fCat')?.value || '';
            const q = new URLSearchParams({start:s, end:e, category:c}).toString();
            loadData(API + '/filter?' + q);
        }

        async function deleteTx(id) {
            if (!confirm('Удалить запись?')) return;
            await fetch(API + '/' + id, { method: 'DELETE' });
            loadData();
        }

        const addForm = document.getElementById('addForm');
        if (addForm) {
            addForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const payload = {
                    category: document.getElementById('category').value,
                    amount: parseFloat(document.getElementById('amount').value),
                    date: document.getElementById('date').value
                };
                await fetch(API, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                e.target.reset();
                loadData();
            });
        }

        function exportExcel() {
            let csv = 'Дата\tКатегория\tСумма\n';
            data.forEach(t => csv += `${t.date}\t${t.category}\t${t.amount}\n`);
            const blob = new Blob(['\ufeff' + csv], {type: 'application/vnd.ms-excel;charset=utf-8'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = (document.getElementById('label')?.value || 'export') + '.xls';
            a.click();
        }

        function exportPDF() {
            const label = document.getElementById('label');
            if (label) label.focus();
            setTimeout(() => window.print(), 100);
        }

        // Финальная инициализация: если не авторизован — скрываем интерфейс
        if (!token || !currentUser) {
            document.querySelectorAll('.no-print').forEach(el => {
                if (el.id !== 'authSection') el.style.display = 'none';
            });
        } else {
            // Если авторизован — сразу грузим данные
            loadData();
        }
    </script>
</body>
</html>
