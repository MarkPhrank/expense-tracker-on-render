# PostgreSQL connection (локально)
# В облаке эти настройки переопределятся через env-переменные JDBC_URL, DB_USER, DB_PASS
spring.datasource.url=jdbc:postgresql://localhost:5432/expense_db
spring.datasource.username=mars
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# Memory optimization for low-end hardware
server.tomcat.threads.max=10
spring.mvc.async.request-timeout=5000
spring.devtools.restart.enabled=false

# Server settings
server.port=${PORT:8080}
spring.main.banner-mode=off

# CORS (разрешаем запросы с любых источников — нужно для мобильного доступа)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
